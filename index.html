<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Financeiro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="topo">
      <h1>Dashboard Financeiro</h1>
      <p>Controle simples de receitas e despesas</p>
    </header>

    <section class="finance">
      <div class="card receita">
        <h2>Receitas</h2>
        <p id="total-receitas">R$ 0,00</p>
      </div>

      <div class="card despesa">
        <h2>Despesas</h2>
        <p id="total-despesas">R$ 0,00</p>
      </div>

      <div class="card saldo">
        <h2>Saldo</h2>
        <p id="saldo-total">R$ 0,00</p>
      </div>
    </section>

    <section class="formulario">
      <h2>Nova Transação</h2>

      <form id="form-transacao">
        <div class="campo">
          <label for="descricao">Descrição</label>
          <input type="text" id="descricao" placeholder="Ex: Salário" required>
        </div>

        <div class="campo">
          <label for="valor">Valor</label>
          <input type="number" id="valor" placeholder="Ex: 1500" step="0.01" required>
        </div>

        <div class="campo">
          <label for="tipo">Tipo</label>
          <select id="tipo" required>
            <option value="">Selecione</option>
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
          </select>
        </div>

        <button type="submit">Adicionar</button>
      </form>
    </section>

    <section class="tabela-section">
      <h2>Transações</h2>

      <table>
        <thead>
          <tr>
            <th>Descrição</th>
            <th>Tipo</th>
            <th>Valor</th>
          </tr>
        </thead>
        <tbody id="lista-transacoes"></tbody>
      </table>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
