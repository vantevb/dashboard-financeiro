<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro PRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-layout">
        <header class="topbar">
            <div class="logo">
                <i class="ph-fill ph-wallet"></i>
                <h2>FinDash</h2>
            </div>
            <button id="export-btn" class="btn btn-outline">
                <i class="ph ph-download-simple"></i> Exportar CSV
            </button>
        </header>

        <main class="dashboard-content">
            <section class="summary-cards">
                <div class="card balance">
                    <div class="card-header">
                        <h4>Saldo Atual</h4>
                        <i class="ph ph-currency-circle-dollar"></i>
                    </div>
                    <h1 id="balance">R$ 0,00</h1>
                </div>
                <div class="card income">
                    <div class="card-header">
                        <h4>Receitas</h4>
                        <i class="ph ph-trend-up"></i>
                    </div>
                    <p id="money-plus" class="money">+ R$ 0,00</p>
                </div>
                <div class="card expense">
                    <div class="card-header">
                        <h4>Despesas</h4>
                        <i class="ph ph-trend-down"></i>
                    </div>
                    <p id="money-minus" class="money">- R$ 0,00</p>
                </div>
            </section>

            <section class="main-grid">
                <div class="grid-left">
                    <div class="card form-card">
                        <h3>Nova Transação</h3>
                        <form id="form">
                            <div class="form-group">
                                <label for="text">Descrição</label>
                                <input type="text" id="text" placeholder="Ex: Salário, Internet..." autocomplete="off"/>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="amount">Valor <small>(negativo = despesa)</small></label>
                                    <input type="number" id="amount" placeholder="Ex: -150.00" step="0.01" />
                                </div>
                                <div class="form-group">
                                    <label for="category">Categoria</label>
                                    <select id="category">
                                        <option value="Receita">Receita</option>
                                        <option value="Moradia">Moradia</option>
                                        <option value="Alimentação">Alimentação</option>
                                        <option value="Transporte">Transporte</option>
                                        <option value="Lazer">Lazer</option>
                                        <option value="Serviços">Serviços</option>
                                        <option value="Outros">Outros</option>
                                    </select>
                                </div>
                            </div>
                            <button class="btn btn-primary w-100">Adicionar Transação</button>
                        </form>
                    </div>

                    <div class="card chart-card">
                        <h3>Análise de Despesas</h3>
                        <div class="chart-container">
                            <canvas id="expensesChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="grid-right">
                    <div class="card history-card">
                        <h3>Histórico</h3>
                        <div class="list-container">
                            <ul id="list" class="list"></ul>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
